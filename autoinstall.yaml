autoinstall:
  version: 1
  codecs:
    install: true
  drivers:
    install: true
  packages:
    - flatpak
  snaps:
    - name: libreoffice
    - name: code
    - name: chromium
  user-data:
     users:
       - name: codeur-admin
         passwd: '$6$elL2TWiBMMeIYgUD$YdhedpNhBY6JtVQx9BUbksX8HVOvyi4yCG6RgBxYvWlSTyiLPydYLd1fdFb9vfLPNBSjwtZv9M7N0.u11muuN0'
         groups: adm cdrom sudo dip plugdev users lpadmin lxd
       - name: codeur-sup
         passwd: '$y$j9T$TOsLeHX61DU2l8VhRYguV.$1NOwH7UPH7pNDjwOggyLlqaftU1Fgyc.OoYpHuVFLO20'
         groups: users
  keyboard:
    layout: fr
    variant: azerty
  locale: fr_FR.UTF-8
  timezone: Europe/Paris
  late-commands:
    - curtin in-target -- flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
    - curtin in-target -- flatpak install flathub org.mobsya.ThymioSuite
    # Cf https://www.thymio.org/fr/installation-sous-linux/
    - curtin in-target -- printf 'SUBSYSTEM=="usb", ATTRS{idVendor}=="0617", ATTRS{idProduct}=="000a", MODE="0666"\nSUBSYSTEM=="usb", ATTRS{idVendor}=="0617", ATTRS{idProduct}=="000c", MODE="0666"\n' | sudo tee /etc/udev/rules.d/99-mobsya.rules && sudo udevadm control --reload-rules
    - curtin in-target -- flatpak install flathub edu.mit.Scratch
